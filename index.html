<!DOCTYPE html>
<html>
<body>
<h1>PS5 Smart Remote</h1>
<button id="spotifyLogin">Login Spotify</button>

<input id="lightOnUrl" placeholder="Lights ON URL" style="width:100%;font-size:16px;"><br><br>
<input id="lightOffUrl" placeholder="Lights OFF URL" style="width:100%;font-size:16px;"><br><br>
<input id="blindsOpenUrl" placeholder="Blinds OPEN URL" style="width:100%;font-size:16px;"><br><br>

<button id="save">Save URLs</button>
<button id="start">Start Controller</button>
<button onclick="window.location.href='spotify://'">Open Spotify Test</button>

<div id="status">Waiting...</div>

<script>
const status = document.getElementById('status');

const SPOTIFY_CLIENT_ID = '8b5a11f19d5c4086842261b1a9aa35e7';
const SPOTIFY_REDIRECT_URI = 'https://uradhere05.github.io/ps5-web-remote/';
const SPOTIFY_SCOPE = 'user-read-playback-state user-modify-playback-state user-read-currently-playing';

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return await crypto.subtle.digest('SHA-256', data);
}

function base64UrlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/=/g, '')
    .replace(/\+/g, '-')
    .replace(/\//g, '_');
}

function randomString(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let result = '';
  const values = crypto.getRandomValues(new Uint8Array(length));
  for (let i = 0; i < length; i++) {
    result += chars[values[i] % chars.length];
  }
  return result;
}

document.getElementById('spotifyLogin').onclick = async () => {
  const verifier = randomString(64);
  localStorage.setItem('spotifyVerifier', verifier);
  const challenge = base64UrlEncode(await sha256(verifier));

  const authUrl =
    'https://accounts.spotify.com/authorize' +
    '?client_id=' + encodeURIComponent(SPOTIFY_CLIENT_ID) +
    '&response_type=code' +
    '&redirect_uri=' + encodeURIComponent(SPOTIFY_REDIRECT_URI) +
    '&scope=' + encodeURIComponent(SPOTIFY_SCOPE) +
    '&code_challenge_method=S256' +
    '&code_challenge=' + encodeURIComponent(challenge);

  window.location.href = authUrl;
};

async function exchangeSpotifyCode(code) {
  const verifier = localStorage.getItem('spotifyVerifier');

  const body = new URLSearchParams({
    client_id: SPOTIFY_CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: SPOTIFY_REDIRECT_URI,
    code_verifier: verifier
  });

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });

  const data = await res.json();

  if (data.access_token) {
    localStorage.setItem('spotifyToken', data.access_token);
    if (data.refresh_token) localStorage.setItem('spotifyRefreshToken', data.refresh_token);
    history.replaceState(null, '', SPOTIFY_REDIRECT_URI);
    status.innerText = 'Spotify logged in';
  } else {
    status.innerText = 'Spotify login failed: ' + JSON.stringify(data);
  }
}

const urlParams = new URLSearchParams(window.location.search);
const spotifyCode = urlParams.get('code');
if (spotifyCode) {
  exchangeSpotifyCode(spotifyCode);
}

const fields = {
  lightOnUrl: document.getElementById('lightOnUrl'),
  lightOffUrl: document.getElementById('lightOffUrl'),
  blindsOpenUrl: document.getElementById('blindsOpenUrl')
};

Object.keys(fields).forEach(key => {
  fields[key].value = localStorage.getItem(key) || '';
});

document.getElementById('save').onclick = () => {
  Object.keys(fields).forEach(key => {
    localStorage.setItem(key, fields[key].value.trim());
  });
  status.innerText = 'URLs saved';
};

let lightsOn = false;
let lastLight = 0;
let lastBlinds = 0;
let lastSpotify = 0;
let started = false;

async function fire(urlKey, label) {
  const url = localStorage.getItem(urlKey);
  if (!url) {
    status.innerText = 'Missing URL: ' + label;
    return;
  }

  status.innerText = label + ' triggered';

  try {
    await fetch(url, { mode: 'no-cors' });
  } catch (e) {
    console.log(e);
  }
}

function loop() {
  const pad = [...navigator.getGamepads()].find(Boolean);

  if (pad) {
    const now = Date.now();

    const xPressed = pad.buttons[0].pressed;
    const trianglePressed = pad.buttons[3].pressed;
    const leftY = pad.axes[1];

    if (xPressed && now - lastLight > 1500) {
      lastLight = now;

      if (lightsOn) {
        fire('lightOffUrl', 'Lights OFF');
      } else {
        fire('lightOnUrl', 'Lights ON');
      }

      lightsOn = !lightsOn;
    }

    if (leftY < -0.7 && now - lastBlinds > 3000) {
      lastBlinds = now;
      fire('blindsOpenUrl', 'Blinds OPEN');
    }

    if (trianglePressed && now - lastSpotify > 2000) {
      lastSpotify = now;
      status.innerText = 'Opening Spotify';
      window.location.href = 'spotify://';
    }
  }

  requestAnimationFrame(loop);
}

document.getElementById('start').onclick = () => {
  if (!started) {
    started = true;
    status.innerText = 'Controller started';
    loop();
  }
};
</script>
</body>
</html>
