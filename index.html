<!DOCTYPE html>
<html>
<body>
<h1>PS5 Controller Test</h1>
<button id="start">Start Controller</button>
<div id="status">Tap Start, then press a controller button.</div>

<script>
const status = document.getElementById('status');

document.getElementById('start').addEventListener('click', () => {
  status.innerText = 'Started. Press controller buttons now.';
  loop();
});

function loop() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  const pad = [...pads].find(Boolean);

  if (pad) {
    status.innerText = 'Connected: ' + pad.id;
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
